server:
    port: 8081

spring:
    application:
        name: mcp-server

    data:
        mongodb:
            uri: mongodb://localhost:27017/ai_agent_db
            auto-index-creation: true

    ai:
        model:
            chat: ollama
            embedding: ollama

        ollama:
            base-url: http://localhost:11434

            chat:
                options:
                    model: llama3.1
                    temperature: 0.2

            embedding:
                options:
                    model: all-minilm

        mcp:
            server:
                enabled: true
                name: ai-tools-server
                version: 1.0.0
                protocol: STREAMABLE
